<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1f0d">
<title>Dispersion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --fairway: #2d5a1b;
    --rough: #1e3d11;
    --green: #3a7d2c;
    --sky: #0d1f0d;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --red: #d94f3a;
    --muted: #8a9e82;
    --card: #162a12;
    --border: #2e4a28;
    --safe: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--sky);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===== MOBILE LAYOUT: 3 views ===== */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    background: rgba(13,31,13,0.97);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--cream);
  }

  .topbar-stats {
    display: flex;
    gap: 16px;
  }

  .tstat { text-align: right; }
  .tstat .v { font-size: 16px; font-weight: 500; color: var(--gold); display: block; line-height: 1; }
  .tstat .l { font-size: 8px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Mono', monospace;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* VIEWS */
  .views { flex: 1; overflow: hidden; position: relative; }

  .view {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .view.active { display: flex; }

  /* ===== LOG VIEW ===== */
  .log-view {
    padding: 16px;
    gap: 12px;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .input-group label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-group input, .input-group select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 16px; /* prevents iOS zoom */
    padding: 11px 12px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .input-group input:focus, .input-group select:focus {
    border-color: var(--gold);
  }

  .input-group select option { background: #1a2e15; }

  .miss-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .miss-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
  }

  .miss-btn:active { transform: scale(0.96); }
  .miss-btn.active { background: var(--gold); border-color: var(--gold); color: #0d1f0d; font-weight: 500; }

  .add-btn {
    background: var(--gold);
    color: #0d1f0d;
    border: none;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .add-btn:active { transform: scale(0.98); background: #e0bc6a; }

  /* ===== HISTORY VIEW ===== */
  .history-view { padding: 16px; gap: 8px; }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .clear-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .clear-btn:active { border-color: var(--red); color: var(--red); }

  .shot-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    animation: slideIn 0.2s ease;
    flex-shrink: 0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shot-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .shot-info { flex: 1; }
  .shot-club { font-size: 13px; color: var(--cream); }
  .shot-detail { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .shot-remove {
    background: none;
    border: none;
    color: var(--border);
    font-size: 18px;
    padding: 4px 8px;
    cursor: pointer;
    line-height: 1;
  }

  .shot-remove:active { color: var(--red); }

  .empty-history {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* CLUB FILTER CHIPS */
  .chip-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .chip-row::-webkit-scrollbar { display: none; }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 50px;
    border: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    color: var(--muted);
    background: transparent;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .chip.active { background: var(--gold); color: #0d1f0d; border-color: var(--gold); }

  /* ===== MAP VIEW ===== */
  .map-view { padding: 0; overflow: hidden; }

  .map-container {
    position: relative;
    width: 100%;
    flex: 1;
    overflow: hidden;
  }

  #dispersionCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .map-stats {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
  }

  .stat-card {
    background: rgba(13,31,13,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    backdrop-filter: blur(8px);
    min-width: 110px;
  }

  .stat-card .label {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .stat-card .value {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--gold);
  }

  .stat-card .unit { font-size: 10px; color: var(--muted); margin-left: 2px; }

  .map-chips {
    position: absolute;
    bottom: calc(12px + var(--safe));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    background: rgba(13,31,13,0.9);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 10px;
    backdrop-filter: blur(8px);
    z-index: 5;
    max-width: calc(100vw - 24px);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .map-chips::-webkit-scrollbar { display: none; }

  .map-empty {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 3;
  }

  .map-empty .ei { font-size: 40px; opacity: 0.25; margin-bottom: 8px; }
  .map-empty p { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); opacity: 0.5; }

  /* BOTTOM SAFE AREA */
  .bottom-safe { height: var(--safe); flex-shrink: 0; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">⛳</div>
      <h1>Dispersion</h1>
    </div>
    <div class="topbar-stats">
      <div class="tstat">
        <span class="v" id="hShots">0</span>
        <span class="l">Shots</span>
      </div>
      <div class="tstat">
        <span class="v" id="hAvg">—</span>
        <span class="l">Avg Yds</span>
      </div>
      <div class="tstat">
        <span class="v" id="hTarget">—</span>
        <span class="l">On Target</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log', this)">Log Shot</button>
    <button class="tab" onclick="switchTab('map', this)">Dispersion</button>
    <button class="tab" onclick="switchTab('history', this)">History</button>
  </div>

  <div class="views">

    <!-- LOG VIEW -->
    <div class="view log-view active" id="view-log">
      <div>
        <div class="section-label">Club & Distance</div>
        <div class="input-row">
          <div class="input-group">
            <label>Club</label>
            <select id="clubSelect">
              <option>Driver</option>
              <option>3-Wood</option>
              <option>5-Wood</option>
              <option>4-Iron</option>
              <option>5-Iron</option>
              <option>6-Iron</option>
              <option selected>7-Iron</option>
              <option>8-Iron</option>
              <option>9-Iron</option>
              <option>PW</option>
              <option>GW</option>
              <option>SW</option>
              <option>LW</option>
            </select>
          </div>
          <div class="input-group">
            <label>Carry (yds)</label>
            <input type="number" id="distInput" placeholder="165" min="0" max="400" inputmode="numeric">
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">Miss Direction</div>
        <div class="miss-grid">
          <button class="miss-btn" data-miss="Far Left" onclick="selectMiss(this)">Far L</button>
          <button class="miss-btn active" data-miss="Center" onclick="selectMiss(this)">Center</button>
          <button class="miss-btn" data-miss="Far Right" onclick="selectMiss(this)">Far R</button>
          <button class="miss-btn" data-miss="Left" onclick="selectMiss(this)">Left</button>
          <button class="miss-btn" data-miss="Short" onclick="selectMiss(this)">Short</button>
          <button class="miss-btn" data-miss="Right" onclick="selectMiss(this)">Right</button>
          <button class="miss-btn" data-miss="Long Left" onclick="selectMiss(this)">Long L</button>
          <button class="miss-btn" data-miss="Long" onclick="selectMiss(this)">Long</button>
          <button class="miss-btn" data-miss="Long Right" onclick="selectMiss(this)">Long R</button>
        </div>
      </div>

      <button class="add-btn" onclick="addShot()">+ Log Shot</button>

      <div class="bottom-safe"></div>
    </div>

    <!-- MAP VIEW -->
    <div class="view map-view" id="view-map">
      <div class="map-container">
        <canvas id="dispersionCanvas"></canvas>
        <div class="map-empty" id="mapEmpty">
          <div class="ei">⛳</div>
          <p>Log shots to see pattern</p>
        </div>
        <div class="map-stats" id="mapStats" style="display:none">
          <div class="stat-card">
            <div class="label">Avg Carry</div>
            <div class="value"><span id="avgCarry">—</span><span class="unit">yds</span></div>
          </div>
          <div class="stat-card">
            <div class="label">Spread</div>
            <div class="value"><span id="dispWidth">—</span><span class="unit">yds</span></div>
          </div>
          <div class="stat-card">
            <div class="label">Miss Tendency</div>
            <div class="value" style="font-size:14px;padding-top:3px" id="missTend">—</div>
          </div>
        </div>
        <div class="map-chips" id="mapChips" style="display:none"></div>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view history-view" id="view-history">
      <div class="history-header">
        <div class="section-label" style="margin:0">All Shots</div>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
      <div class="chip-row" id="historyChips"></div>
      <div id="shotLog"></div>
      <div class="bottom-safe"></div>
    </div>

  </div>
</div>

<script>
  const STORAGE_KEY = 'dispersion_shots_v1';
  let shots = [];
  let selectedMiss = 'Center';
  let filterClub = 'All';
  let mapFilter = 'All';

  const MISS_OFFSETS = {
    'Far Left':   { dx: -2.2, dy: 0.0 },
    'Left':       { dx: -1.1, dy: 0.0 },
    'Center':     { dx: 0.0,  dy: 0.0 },
    'Right':      { dx: 1.1,  dy: 0.0 },
    'Far Right':  { dx: 2.2,  dy: 0.0 },
    'Short':      { dx: 0.0,  dy: 1.5 },
    'Long':       { dx: 0.0,  dy: -1.5 },
    'Long Left':  { dx: -1.4, dy: -1.2 },
    'Long Right': { dx: 1.4,  dy: -1.2 },
  };

  const CLUB_COLORS = {
    'Driver': '#e8c84a', '3-Wood': '#6ec6e8', '5-Wood': '#82d4f0',
    '4-Iron': '#e87a4a', '5-Iron': '#e89a6a', '6-Iron': '#d4a86a',
    '7-Iron': '#a8d46e', '8-Iron': '#7ac68a', '9-Iron': '#5ab870',
    'PW': '#c86ee8', 'GW': '#b05ad4', 'SW': '#e86ea8', 'LW': '#e8a0c8',
  };

  /* ===== STORAGE ===== */
  function saveShots() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(shots)); } catch(e) {}
  }

  function loadShots() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) shots = JSON.parse(raw);
    } catch(e) { shots = []; }
  }

  /* ===== TABS ===== */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'map') { setTimeout(drawCanvas, 50); }
    if (name === 'history') { renderHistory(); }
  }

  /* ===== MISS SELECTION ===== */
  function selectMiss(btn) {
    document.querySelectorAll('.miss-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMiss = btn.dataset.miss;
  }

  /* ===== ADD SHOT ===== */
  function addShot() {
    const club = document.getElementById('clubSelect').value;
    const dist = parseFloat(document.getElementById('distInput').value);
    const input = document.getElementById('distInput');

    if (!dist || dist <= 0) {
      input.style.borderColor = '#d94f3a';
      input.focus();
      setTimeout(() => input.style.borderColor = '', 1200);
      return;
    }

    const jitter = v => v + (Math.random() - 0.5) * 0.45;
    const base = MISS_OFFSETS[selectedMiss] || { dx: 0, dy: 0 };

    shots.push({
      id: Date.now(),
      club,
      dist,
      miss: selectedMiss,
      dx: jitter(base.dx),
      dy: jitter(base.dy),
      color: CLUB_COLORS[club] || '#e8c84a',
      ts: Date.now(),
    });

    saveShots();
    input.value = '';
    input.blur();
    updateHeaderStats();

    // Brief flash feedback
    const btn = document.querySelector('.add-btn');
    btn.textContent = '✓ Logged';
    btn.style.background = '#4a9e3a';
    setTimeout(() => {
      btn.textContent = '+ Log Shot';
      btn.style.background = '';
    }, 900);
  }

  /* ===== REMOVE SHOT ===== */
  function removeShot(id) {
    shots = shots.filter(s => s.id !== id);
    saveShots();
    renderHistory();
    updateHeaderStats();
  }

  /* ===== CLEAR ALL ===== */
  function clearAll() {
    if (shots.length === 0) return;
    if (!confirm('Clear all shots?')) return;
    shots = [];
    filterClub = 'All';
    mapFilter = 'All';
    saveShots();
    renderHistory();
    updateHeaderStats();
    drawCanvas();
  }

  /* ===== HEADER STATS ===== */
  function updateHeaderStats() {
    document.getElementById('hShots').textContent = shots.length;
    if (shots.length === 0) {
      document.getElementById('hAvg').textContent = '—';
      document.getElementById('hTarget').textContent = '—';
      return;
    }
    const avg = shots.reduce((s, x) => s + x.dist, 0) / shots.length;
    document.getElementById('hAvg').textContent = Math.round(avg);
    const onTarget = shots.filter(s => Math.abs(s.dx) < 0.6).length;
    document.getElementById('hTarget').textContent = Math.round(onTarget / shots.length * 100) + '%';
  }

  /* ===== HISTORY RENDER ===== */
  function renderHistory() {
    const chips = document.getElementById('historyChips');
    const log = document.getElementById('shotLog');

    const clubs = [...new Set(shots.map(s => s.club))];
    const allChips = ['All', ...clubs];

    chips.innerHTML = allChips.map(c => `
      <button class="chip ${filterClub === c ? 'active' : ''}" onclick="setHistoryFilter('${c}')">${c}</button>
    `).join('');

    const filtered = filterClub === 'All' ? shots : shots.filter(s => s.club === filterClub);

    if (filtered.length === 0) {
      log.innerHTML = `<div class="empty-history"><div class="empty-icon">⛳</div><p>${shots.length === 0 ? 'No shots yet' : 'No shots for this club'}</p></div>`;
      return;
    }

    log.innerHTML = [...filtered].reverse().map(s => `
      <div class="shot-item">
        <div class="shot-dot" style="background:${s.color}"></div>
        <div class="shot-info">
          <div class="shot-club">${s.club}</div>
          <div class="shot-detail">${s.dist} yds &middot; ${s.miss}</div>
        </div>
        <button class="shot-remove" onclick="removeShot(${s.id})">×</button>
      </div>
    `).join('');
  }

  function setHistoryFilter(club) {
    filterClub = club;
    renderHistory();
  }

  /* ===== MAP FILTER ===== */
  function setMapFilter(club) {
    mapFilter = club;
    drawCanvas();
    updateMapStats();
    // Re-render chips
    renderMapChips();
  }

  function renderMapChips() {
    const el = document.getElementById('mapChips');
    if (shots.length === 0) { el.style.display = 'none'; return; }
    el.style.display = 'flex';
    const clubs = ['All', ...new Set(shots.map(s => s.club))];
    el.innerHTML = clubs.map(c => `
      <button class="chip ${mapFilter === c ? 'active' : ''}" onclick="setMapFilter('${c}')" style="font-size:9px;padding:5px 10px;">${c}</button>
    `).join('');
  }

  function getMapFiltered() {
    return mapFilter === 'All' ? shots : shots.filter(s => s.club === mapFilter);
  }

  /* ===== MAP STATS ===== */
  function updateMapStats() {
    const filtered = getMapFiltered();
    const el = document.getElementById('mapStats');
    if (filtered.length === 0) { el.style.display = 'none'; return; }
    el.style.display = 'flex';

    const avg = filtered.reduce((s, x) => s + x.dist, 0) / filtered.length;
    document.getElementById('avgCarry').textContent = Math.round(avg);

    const dxVals = filtered.map(s => s.dx);
    const spread = Math.max(...dxVals) - Math.min(...dxVals);
    document.getElementById('dispWidth').textContent = Math.round(spread * 14);

    const missCount = {};
    filtered.forEach(s => {
      const side = s.dx < -0.3 ? 'Left' : s.dx > 0.3 ? 'Right' : 'Straight';
      missCount[side] = (missCount[side] || 0) + 1;
    });
    const top = Object.entries(missCount).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('missTend').textContent = top ? top[0] : '—';
  }

  /* ===== CANVAS ===== */
  function drawCanvas() {
    const canvas = document.getElementById('dispersionCanvas');
    const container = canvas.parentElement;
    const W = container.clientWidth;
    const H = container.clientHeight;
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#1e3d11';
    ctx.fillRect(0, 0, W, H);

    const filtered = getMapFiltered();
    document.getElementById('mapEmpty').style.display = filtered.length === 0 ? 'block' : 'none';

    renderMapChips();
    updateMapStats();

    const targetDist = filtered.length > 0
      ? filtered.reduce((s, x) => s + x.dist, 0) / filtered.length
      : 150;

    const CX = W / 2;
    const CY = H * 0.87;
    const scale = Math.min(H * 0.72, W * 0.7) / (targetDist * 1.15);

    drawFairway(ctx, CX, CY, scale, targetDist, W, H);

    if (filtered.length === 0) return;

    if (filtered.length >= 2) drawDispersionEllipse(ctx, filtered, CX, CY, scale);

    filtered.forEach(s => {
      const x = CX + s.dx * scale * 16;
      const y = CY - s.dist * scale;
      drawShot(ctx, x, y, s.color);
    });
  }

  function drawFairway(ctx, CX, CY, scale, targetDist, W, H) {
    const fwWidth = 50 * scale;
    const fwLength = targetDist * scale * 1.75;

    const fwGrad = ctx.createLinearGradient(CX, CY, CX, CY - fwLength);
    fwGrad.addColorStop(0, '#2d6820');
    fwGrad.addColorStop(1, '#2a6018');
    ctx.fillStyle = fwGrad;
    ctx.beginPath();
    ctx.moveTo(CX - fwWidth * 0.85, CY);
    ctx.bezierCurveTo(CX - fwWidth, CY - fwLength * 0.4, CX - fwWidth * 0.6, CY - fwLength * 0.75, CX - fwWidth * 0.5, CY - fwLength);
    ctx.lineTo(CX + fwWidth * 0.5, CY - fwLength);
    ctx.bezierCurveTo(CX + fwWidth * 0.6, CY - fwLength * 0.75, CX + fwWidth, CY - fwLength * 0.4, CX + fwWidth * 0.85, CY);
    ctx.closePath();
    ctx.fill();

    // Green
    const greenR = 40 * scale;
    const gX = CX, gY = CY - targetDist * scale;
    const gGrad = ctx.createRadialGradient(gX, gY, 0, gX, gY, greenR);
    gGrad.addColorStop(0, '#4a9e3a');
    gGrad.addColorStop(1, '#326024');
    ctx.beginPath();
    ctx.ellipse(gX, gY, greenR * 1.3, greenR, 0, 0, Math.PI * 2);
    ctx.fillStyle = gGrad;
    ctx.fill();

    // Flag
    ctx.beginPath();
    ctx.moveTo(gX + 3, gY - greenR * 0.3);
    ctx.lineTo(gX + 3, gY - greenR * 0.3 - 24);
    ctx.strokeStyle = '#c8c8c8';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#d94f3a';
    ctx.beginPath();
    ctx.moveTo(gX + 3, gY - greenR * 0.3 - 24);
    ctx.lineTo(gX + 15, gY - greenR * 0.3 - 18);
    ctx.lineTo(gX + 3, gY - greenR * 0.3 - 12);
    ctx.fill();

    // Yardage lines
    const markers = [50, 100, 150, 200, 250, 300].filter(d => d < targetDist * 1.5);
    ctx.font = '8px DM Mono, monospace';
    ctx.textAlign = 'right';
    markers.forEach(d => {
      const my = CY - d * scale;
      if (my < 10 || my > H - 5) return;
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(CX - fwWidth * 1.1, my);
      ctx.lineTo(CX + fwWidth * 1.1, my);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillText(d + 'y', CX - fwWidth * 1.15, my + 3);
    });
  }

  function drawDispersionEllipse(ctx, shots, CX, CY, scale) {
    const dxVals = shots.map(s => s.dx * scale * 16);
    const dyVals = shots.map(s => s.dist * scale);
    const cx = CX + dxVals.reduce((a,b) => a+b, 0) / dxVals.length;
    const cy = CY - dyVals.reduce((a,b) => a+b, 0) / dyVals.length;
    const rx = Math.max((Math.max(...dxVals) - Math.min(...dxVals)) / 2 + 16, 16);
    const ry = Math.max((Math.max(...dyVals) - Math.min(...dyVals)) / 2 + 16, 16);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(232,200,74,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 5]);
    ctx.stroke();
    ctx.fillStyle = 'rgba(232,200,74,0.04)';
    ctx.fill();
    ctx.restore();
  }

  function drawShot(ctx, x, y, color) {
    const grd = ctx.createRadialGradient(x, y, 0, x, y, 9);
    grd.addColorStop(0, color + 'bb');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  /* ===== RESIZE ===== */
  window.addEventListener('resize', () => {
    if (document.getElementById('view-map').classList.contains('active')) drawCanvas();
  });

  /* ===== INIT ===== */
  loadShots();
  updateHeaderStats();
  renderHistory();
  setTimeout(drawCanvas, 80);
</script>
</body>
</html>
